name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Skip if no code yet
        id: gate
        shell: bash
        run: |
          if [ ! -f requirements.txt ]; then
            echo "no_code=true" >> "$GITHUB_OUTPUT"
            echo "Skipping — implementation has not started yet."
          else
            echo "no_code=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.gate.outputs.no_code == 'false'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Black format check
        if: steps.gate.outputs.no_code == 'false'
        run: black --check karotcam/ tests/

      - name: Mypy type check
        if: steps.gate.outputs.no_code == 'false'
        run: mypy karotcam/

      - name: Pytest
        if: steps.gate.outputs.no_code == 'false'
        run: pytest -v
